name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  QEMU_TAG: v9.2.4

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build deps
        run: bash scripts/setup-deps.sh

      - name: Cache QEMU build
        uses: actions/cache@v5
        with:
          path: qemu
          # Invalidate on any overlay source, the target/riscv patch, or build.sh
          # (all feed scripts/build.sh: ws63.c, trans_xlinx, the qtest, trace events).
          key: qemu-${{ env.QEMU_TAG }}-${{ hashFiles('src/**', 'patches/**', 'scripts/build.sh') }}-${{ runner.os }}

      - name: Build qemu-system-riscv32 with the WS63 machine
        run: bash scripts/build.sh

      - name: Sanity — ws63 machine is registered
        run: ./qemu/build/qemu-system-riscv32 -M help | grep -q ws63

      - name: Install ws63 Rust toolchain
        run: |
          curl -fLO https://github.com/sanchuanhehe/ws63-rust-toolchain/releases/download/v1.96.0/ws63-rust-1.96.0-x86_64-unknown-linux-gnu.tar.gz
          tar xzf ws63-rust-1.96.0-x86_64-unknown-linux-gnu.tar.gz
          rustup toolchain link ws63 "$PWD/stage2"

      - name: Checkout ws63-rs (firmware source)
        uses: actions/checkout@v5
        with:
          repository: sanchuanhehe/ws63-rs
          submodules: recursive
          path: ws63-rs

      - name: Build example firmware
        working-directory: ws63-rs
        # default-members = the libraries + every smoke-tested example
        # (blinky / uart_hello / timer_irq / gpio_irq / reset_demo).
        run: cargo build --release

      - name: Smoke test (run ws63-rs firmware on the WS63 machine)
        run: WS63_RS="$PWD/ws63-rs" bash scripts/smoke-test.sh

      # Boots the committed fbb_ws63 C SDK peripheral-sample ELFs (tests/csdk/) and
      # asserts each sample's UART marker — validates the peripheral models against
      # real vendor firmware. No SDK/toolchain needed (uses prebuilt fixtures).
      - name: C SDK peripheral-sample tests
        run: bash scripts/csdk-test.sh

      # Register-level, boot-free regression of the GPIO/UART/timer/INTC/DMA
      # models (drives MMIO directly via libqtest). Built by scripts/build.sh.
      - name: QTest (register-level regression)
        run: bash scripts/qtest.sh
