name: qtest-matrix

# Boot-free, register-level qtest regression (tests/qtest/ws63-test) across a
# MATRIX of QEMU base releases. This is the phase-6 maintainability radar: the
# WS63 model is an out-of-tree overlay (the copied ws63.c / xlinx decoder / qtest
# + a PER-VERSION patch-series under patches/<tag>/, applied by scripts/build.sh).
# The #1 maintenance risk is a new QEMU release shifting the files the series
# touches; each supported version therefore keeps its own series, and this matrix
# proves every supported version still applies/builds/passes.
#
# - A version with a patches/<tag>/ dir is REQUIRED (must stay green).
# - A newer version with no series yet is EXPERIMENTAL (continue-on-error):
#   build.sh fails "not ported", which is the "add patches/<tag>/" signal — not a
#   merge blocker.
#
# The qtest needs no Rust toolchain and boots no firmware — it drives the device
# models directly over MMIO — so each cell is just: deps -> build QEMU -> qtest.

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly, so a newly-tagged QEMU that breaks the overlay shows up even with
    # no repo activity.
    - cron: "0 6 * * 1"

# Newer pushes supersede in-flight runs on the same ref.
concurrency:
  group: qtest-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qtest:
    name: qtest (QEMU ${{ matrix.qemu_tag }})
    runs-on: ubuntu-latest
    # Non-required cells may fail without failing the workflow.
    continue-on-error: ${{ !matrix.required }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Supported versions — each has its own series under patches/<tag>/, both
          # verified to apply, build, and pass qtest. Blocking.
          - qemu_tag: v10.0.0   # current default baseline
            required: true
          - qemu_tag: v9.2.4    # previous pin, kept maintained
            required: true
          # Newest stable — forward-compat radar. No patches/v10.2.3/ yet (target/
          # riscv + hw/riscv churned after 10.0), so build.sh fails "not ported";
          # allowed to fail. A red cell is the "port the series to the next QEMU"
          # signal. Add patches/v10.2.3/ to turn it green.
          - qemu_tag: v10.2.3
            required: false

    steps:
      - uses: actions/checkout@v5

      - name: Install build deps
        run: bash scripts/setup-deps.sh

      - name: Cache QEMU build
        uses: actions/cache@v5
        with:
          path: qemu
          # Key on the QEMU tag too (each cell builds its own tree), plus every
          # overlay input that scripts/build.sh injects.
          key: qtest-${{ matrix.qemu_tag }}-${{ hashFiles('src/**', 'patches/**', 'scripts/build.sh') }}-${{ runner.os }}

      - name: Build WS63 QEMU + qtest (${{ matrix.qemu_tag }})
        run: QEMU_TAG=${{ matrix.qemu_tag }} bash scripts/build.sh

      - name: QTest (register-level regression)
        run: bash scripts/qtest.sh
